name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp \
            index.html \
            property-maintenance-budapest.html \
            handyman-services-budapest.html \
            painting-wall-repairs-budapest.html \
            garden-maintenance-budapest.html \
            cleaning-services-budapest.html \
            airbnb-property-maintenance-budapest.html \
            property-management-for-foreign-owners-budapest.html \
            styles.css \
            styles-base.css \
            script.js \
            script-core.js \
            robots.txt \
            sitemap.xml \
            _site/
          if [ -f CNAME ]; then
            cp CNAME _site/CNAME
            test -s _site/CNAME
          fi
          cp -R assets _site/assets
          cp -R hu _site/hu
          test "$(head -n 1 _site/index.html)" = "<!DOCTYPE html>"
          grep -F '<link rel="stylesheet" href="styles.css?v=seo-foundation-v1-2026-07-21-02">' _site/index.html
          grep -F '<script src="script.js?v=seo-foundation-v1-2026-07-21-02" defer></script>' _site/index.html
          grep -F '<link rel="stylesheet" href="../styles.css?v=seo-foundation-v1-2026-07-21-02">' _site/hu/index.html
          grep -F '<script src="../script.js?v=seo-foundation-v1-2026-07-21-02" defer></script>' _site/hu/index.html
          test -s _site/property-maintenance-budapest.html
          test -s _site/handyman-services-budapest.html
          test -s _site/painting-wall-repairs-budapest.html
          test -s _site/garden-maintenance-budapest.html
          test -s _site/cleaning-services-budapest.html
          test -s _site/airbnb-property-maintenance-budapest.html
          test -s _site/property-management-for-foreign-owners-budapest.html
          test -s _site/hu/index.html
          test -s _site/hu/ingatlan-karbantartas-budapest.html
          test -s _site/hu/ezermester-budapest.html
          test -s _site/hu/szobafestes-faljavitas-budapest.html
          test -s _site/hu/kertfenntartas-budapest.html
          test -s _site/hu/takaritas-budapest.html
          test -s _site/hu/airbnb-karbantartas-budapest.html
          test -s _site/hu/ingatlankezeles-kulfoldi-tulajdonosoknak-budapest.html
          test -s _site/styles.css
          test -s _site/styles-base.css
          test -s _site/script.js
          test -s _site/script-core.js
          test -d _site/assets

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
