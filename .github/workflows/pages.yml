name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html styles.css script.js robots.txt sitemap.xml _site/
          cp -R assets _site/assets
          test "$(head -n 1 _site/index.html)" = "<!DOCTYPE html>"
          grep -F '<link rel="stylesheet" href="styles.css">' _site/index.html
          grep -F '<script src="script.js" defer></script>' _site/index.html
          test -s _site/styles.css
          test -s _site/script.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Use workflow Pages source
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail-with-body -L -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages" \
            -d '{"cname":null,"build_type":"workflow"}'

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
